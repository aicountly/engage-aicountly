name: Deploy Production via SSH

# Manual only — run from Actions → Deploy Production via SSH → Run workflow.
# Never triggered by push; server api/.env is not modified by this workflow.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engage-production
  cancel-in-progress: true

env:
  PROD_SFTP_HOST: ${{ secrets.PROD_SFTP_HOST }}
  PROD_SFTP_PORT: ${{ secrets.PROD_SFTP_PORT }}
  PROD_SFTP_USER: ${{ secrets.PROD_SFTP_USER }}
  PROD_SFTP_REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
  # Keep non-interactive SSH quiet; -T avoids cPanel motd breaking rsync protocol.
  SSH_OPTS: -T -o BatchMode=yes -o LogLevel=ERROR -o RequestTTY=no
  SCP_OPTS: -o BatchMode=yes -o LogLevel=ERROR -o RequestTTY=no
  RSYNC_PATH: env -i PATH=/usr/bin:/bin:/usr/local/bin:/usr/local/cpanel/3rdparty/bin rsync

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create web .env for production build
        env:
          VITE_API_URL_SECRET: ${{ secrets.VITE_API_URL }}
          VITE_API_URL_VAR: ${{ vars.VITE_API_URL }}
          VITE_APP_NAME_SECRET: ${{ secrets.VITE_APP_NAME }}
          VITE_APP_NAME_VAR: ${{ vars.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL_SECRET:-}"
          if [ -z "$API_URL" ]; then API_URL="${VITE_API_URL_VAR:-}"; fi
          if [ -z "$API_URL" ]; then
            echo "::error::Set VITE_API_URL in GitHub Actions secrets or repository variables."
            exit 1
          fi

          APP_NAME="${VITE_APP_NAME_SECRET:-}"
          if [ -z "$APP_NAME" ]; then APP_NAME="${VITE_APP_NAME_VAR:-AICOUNTLY Engage Portal}"; fi

          printf 'VITE_API_URL=%s\nVITE_APP_NAME=%s\n' "$API_URL" "$APP_NAME" > .env
          echo "Frontend build env configured from GitHub secrets/variables (server api/.env is not touched by deploy)"

      - name: Build for production
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist || (echo "dist missing — build failed" && exit 1)
          echo "Build ready: $(find dist -type f | wc -l) files in dist"

      - name: Install server-php Composer dependencies (production)
        working-directory: server-php
        run: |
          composer install --no-dev --no-interaction --no-progress --optimize-autoloader --prefer-dist
          test -d vendor/codeigniter4/framework || (echo "CI4 framework missing after install" && exit 1)

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        working-directory: .
        run: |
          if [ -z "${PROD_SFTP_HOST:-}" ] || [ -z "${PROD_SFTP_PORT:-}" ]; then
            echo "::error::Missing repository secrets: set PROD_SFTP_HOST and PROD_SFTP_PORT under Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! ssh-keyscan -T 15 -p "$PROD_SFTP_PORT" "$PROD_SFTP_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::warning::ssh-keyscan could not reach $PROD_SFTP_HOST:$PROD_SFTP_PORT — falling back to StrictHostKeyChecking=accept-new"
            printf 'Host %s\n  Port %s\n  StrictHostKeyChecking accept-new\n' "$PROD_SFTP_HOST" "$PROD_SFTP_PORT" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: Verify SSH and remote rsync
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}")

          echo "Testing SSH login..."
          "${SSH_CMD[@]}" "echo SSH_OK"

          echo "Checking for unexpected login output (breaks rsync protocol)..."
          LOGIN_OUT=$("${SSH_CMD[@]}" "printf RSYNC_SHELL_OK" 2>/dev/null || true)
          if [ "$LOGIN_OUT" != "RSYNC_SHELL_OK" ]; then
            echo "::warning::SSH stdout was not clean: $(printf %q "$LOGIN_OUT")"
          fi

          echo "Remote rsync:"
          "${SSH_CMD[@]}" "command -v rsync && rsync --version | head -1" || {
            echo "::error::rsync is not available for ${PROD_SFTP_USER}@${PROD_SFTP_HOST}. Enable rsync/SSH in cPanel or contact hosting support."
            exit 1
          }

          echo "Ensuring remote deploy paths exist..."
          "${SSH_CMD[@]}" "test -d \"${REMOTE_ROOT}\" || mkdir -p \"${REMOTE_ROOT}\" \"${REMOTE_ROOT}/api\""

      - name: Deploy dist contents into public_html
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -p ${PROD_SFTP_PORT} ${SSH_OPTS}"
          rsync -avz --delete \
            --rsync-path="${RSYNC_PATH}" \
            --exclude 'api/' \
            --exclude 'php.ini' \
            -e "$RSYNC_RSH" \
            dist/ \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/"

      - name: Stamp API revision for deploy verification
        working-directory: .
        run: echo "${{ github.sha }}" > server-php/REVISION

      - name: Deploy server-php into public_html/api
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -p ${PROD_SFTP_PORT} ${SSH_OPTS}"
          rsync -avz --delete \
            --rsync-path="${RSYNC_PATH}" \
            --filter='merge scripts/cpanel-rsync-api.filters' \
            -e "$RSYNC_RSH" \
            server-php/ \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/api/"

      - name: Post-deploy api setup (preserve .env, ship .env.example)
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          scp -P "$PROD_SFTP_PORT" ${SCP_OPTS} scripts/cpanel-post-deploy-api.sh \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh"
          ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}" \
            "chmod +x '${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh' && \
             bash '${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh' '${REMOTE_ROOT}/api'"

      - name: Verify files on remote server
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}" '
            echo "---- public_html listing ----"
            ls -lah '"${REMOTE_ROOT}"'/
            echo "---- assets listing ----"
            ls -lah '"${REMOTE_ROOT}"'/assets || true
            echo "---- index.html top lines ----"
            sed -n "1,80p" '"${REMOTE_ROOT}"'/index.html
            echo "---- api listing ----"
            ls -lah '"${REMOTE_ROOT}"'/api/ || true
            echo "---- api/.env present (content not shown) ----"
            test -f '"${REMOTE_ROOT}"'/api/.env && echo "api/.env exists" || echo "MISSING api/.env"
          '
